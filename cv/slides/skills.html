<section id="skills" class="slide skills-f1">

  <!-- Sterrennacht achtergrond -->
  <div class="stars-bg">
    <div class="stars-layer sl-s"></div>
    <div class="stars-layer sl-m"></div>
    <div class="stars-layer sl-l"></div>
    <div class="stars-shooting">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Title -->
  <h2 class="skills-f1-title">Mijn Skills</h2>

    <!-- Skill labels -->
  <div class="skill-node sn1">Oplossingsgericht</div>
  <div class="skill-node sn2">Creatief</div>
  <div class="skill-node sn3">Samenwerken</div>
  <div class="skill-node sn4">Geduldig</div>
  <div class="skill-node sn5">Out of the box</div>

  <!-- F1 car rijdt de baan op -->
  <div class="f1-wrap">
    <img class="f1-car" src="images/f1.png" alt="F1 auto" />
  </div>

  <!-- Horizon landscape: perspective road to vanishing point -->
  <div class="f1-road">
    <svg viewBox="0 0 1000 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polygon class="road-asphalt" points="430,310 570,310 1000,600 0,600"/>
      <line class="road-edge"    x1="430" y1="310" x2="0"    y2="600"/>
      <line class="road-edge"    x1="570" y1="310" x2="1000" y2="600"/>
      <line class="road-centre"  x1="500" y1="314" x2="500"  y2="600"/>
      <line class="road-horizon" x1="0"   y1="310" x2="1000" y2="310"/>
    </svg>
  </div>

  <!-- SVG lines: groeien vanuit verschillende onderdelen van de auto -->
  <svg class="skills-lines" viewBox="0 0 1000 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <circle class="sl-dot sd1" cx="120"  cy="275" r="5"/>
    <circle class="sl-dot sd2" cx="275"  cy="225" r="5"/>
    <circle class="sl-dot sd3" cx="500"  cy="155" r="5"/>
    <circle class="sl-dot sd4" cx="725"  cy="225" r="5"/>
    <circle class="sl-dot sd5" cx="880"  cy="275" r="5"/>
    <polyline class="sl sl3" points="500,568  500,155"/>          <!-- neus / driver -->
    <polyline class="sl sl2" points="345,575  345,225  275,225"/> <!-- linker wiel -->
    <polyline class="sl sl4" points="655,575  655,225  725,225"/> <!-- rechter wiel -->
    <polyline class="sl sl1" points="195,585  195,275  120,275"/> <!-- linker vleugel -->
    <polyline class="sl sl5" points="805,585  805,275  880,275"/> <!-- rechter vleugel -->
  </svg>



</section>
