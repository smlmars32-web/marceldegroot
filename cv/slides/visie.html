<section id="visie" class="slide slide-white">

 <div class="visie-layout">

    <!-- Winnie zweeft links -->
    <div class="visie-img-wrap reveal-l">
      <img class="visie-winnie" src="images/winnie.png" alt="Winnie the Pooh" />
    </div>

    <!-- Quote + uitleg rechts -->
    <div class="visie-text">
      <blockquote class="visie-quote reveal d1">
        <p>What if I fall?</p>
        <p>Oh, but my darling,</p>
        <p><em>what if you fly?</em></p>
      </blockquote>
      <p class="visie-uitleg reveal d2">
        Ik denk graag in mogelijkheden en laat mij niet stoppen
        door dingen die onmogelijk lijken.
      </p>
    </div>

  </div>
  <div class="wave-bottom">
    <svg viewBox="0 0 1440 70" preserveAspectRatio="none" fill="#0f172a">
      <path d="M0,30 C480,70 960,10 1440,45 L1440,70 L0,70 Z"/>
    </svg>
  </div>

  <!-- Wolkjes: drijven van boven naar beneden -->
  <div class="visie-clouds" aria-hidden="true">
    <svg class="wolk w1" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">

      <ellipse cx="120" cy="38" rx="52" ry="30" fill="rgba(255,255,255,0.07)"/>
    </svg>
    <svg class="wolk w2" viewBox="0 0 260 90" fill="none" xmlns="http://www.w3.org/2000/svg">

      <ellipse cx="90"  cy="50" rx="60"  ry="32" fill="rgba(255,255,255,0.06)"/>
      <ellipse cx="160" cy="44" rx="68"  ry="35" fill="rgba(255,255,255,0.06)"/>
    </svg>
    <svg class="wolk w3" viewBox="0 0 180 70" fill="none" xmlns="http://www.w3.org/2000/svg">
